        function filterInstructorByDate(date) { if(!date) { isFilterActive=false; currentFilterDate=''; instructorData = originalJournalData.filter(t => ['ИНСТ','инст'].some(k=> (t.task||'').toLowerCase().includes(k.toLowerCase()))); currentInstructorPage=1; renderInstructorCards(instructorData); updateTabBadges(); return; } isFilterActive=true; currentFilterDate=date; instructorData = originalJournalData.filter(t => t.completedDate===date && ['ИНСТ','инст'].some(k=> (t.task||'').toLowerCase().includes(k.toLowerCase()))); currentInstructorPage=1; renderInstructorCards(instructorData); updateTabBadges(); }
        function filterEngineerByDate(date) { if(!date) { isFilterActive=false; currentFilterDate=''; engineerData = originalJournalData.filter(t => (t.task||'').toLowerCase().includes('клуб')); currentEngineerPage=1; renderEngineerCards(engineerData); updateTabBadges(); return; } isFilterActive=true; currentFilterDate=date; engineerData = originalJournalData.filter(t => t.completedDate===date && (t.task||'').toLowerCase().includes('клуб')); currentEngineerPage=1; renderEngineerCards(engineerData); updateTabBadges(); }
        function clearDateFilter() { const inp = document.getElementById('date-filter-input'); if(inp) inp.value = ''; const active = document.querySelector('.tab-content.active'); if(active?.id === 'tab1') filterJournalByDate(''); else if(active?.id === 'tab2') filterInstructorByDate(''); else if(active?.id === 'tab3') filterEngineerByDate(''); }
        
        async function initializeApp() { showLoader(); document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); btn.classList.add('active'); const id=btn.getAttribute('data-tab'); document.getElementById(id).classList.add('active'); if(id==='tab2'){ currentInstructorPage=1; renderInstructorCards(instructorData); } else if(id==='tab1'){ currentJournalPage=1; renderJournalCards(journalData); } else { currentEngineerPage=1; renderEngineerCards(engineerData); } if(isFilterActive && currentFilterDate) { if(id==='tab1') filterJournalByDate(currentFilterDate); else if(id==='tab2') filterInstructorByDate(currentFilterDate); else filterEngineerByDate(currentFilterDate); } scrollToTop(); })); initDatePicker(); await loadAllTasks(); renderJournalCards(journalData); renderInstructorCards(instructorData); renderEngineerCards(engineerData); updateTabBadges(); setTimeout(()=>hideLoader(),300); setInterval(async () => { try { await loadAllTasks(); const active = document.querySelector('.tab-content.active'); if(active?.id==='tab2') renderInstructorCards(instructorData); else if(active?.id==='tab1') renderJournalCards(journalData); else if(active?.id==='tab3') renderEngineerCards(engineerData); updateTabBadges(); } catch(e) { console.warn(e); } }, 60000); setTimeout(()=>isInitialLoad=false,1000); }
        
        window.addEventListener('load',()=>{ const logged = localStorage.getItem('userLoggedIn')==='true', email=localStorage.getItem('userEmail'), name=localStorage.getItem('userName'), nameSheet=localStorage.getItem('userNameFromSheet'), pic=localStorage.getItem('userPic'); if(logged && email) { loginSection.style.display='none'; mainContent.style.display='block'; currentUser={ email, name, picture:pic }; currentUserNameFromSheet = nameSheet || name; updateUserAvatar(currentUser); showLoading(true); loadSheetsAPI().then(()=>gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs:['https://sheets.googleapis.com/$discovery/rest?version=v4'] })).then(()=>checkEmailInSheet(email)).catch(()=>signOut()); } else { loginSection.style.display='flex'; mainContent.style.display='none'; setTimeout(()=>loadingScreen.classList.add('fade-out'),500); } });
        window.openDriveLink = openDriveLink; window.submitTaskWithConfirm = submitTaskWithConfirm; window.goToPage = goToPage; window.changePage = changePage; window.toggleUserDropdown = toggleUserDropdown; window.signOut = signOut;
    </script>
</body>
