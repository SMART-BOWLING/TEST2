    <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>

  </header>

<script>
// ====================== СИСТЕМА МАРКЕРОВ ======================
let allPoints = {};      // { manualName: [{x, y, number}] }
let activePointMode = {};

function loadPointsForManual(manualName) {
    const saved = localStorage.getItem(`points_${manualName}`);
    if (saved) { allPoints[manualName] = JSON.parse(saved); } 
    else { allPoints[manualName] = []; }
    return allPoints[manualName];
}
function savePointsForManual(manualName) {
    localStorage.setItem(`points_${manualName}`, JSON.stringify(allPoints[manualName] || []));
}
function addPointToManual(manualName, xPercent, yPercent, number) {
    if (!allPoints[manualName]) allPoints[manualName] = [];
    allPoints[manualName].push({ x: xPercent, y: yPercent, number: number, createdAt: Date.now() });
    savePointsForManual(manualName);
    drawPointsOnImage(manualName);
    updatePointsListInUI(manualName);
}
function deletePointFromManual(manualName, index) {
    if (allPoints[manualName] && allPoints[manualName][index]) {
        allPoints[manualName].splice(index, 1);
        savePointsForManual(manualName);
        drawPointsOnImage(manualName);
        updatePointsListInUI(manualName);
    }
}
function drawPointsOnImage(manualName) {
    const block = document.querySelector(`.block[data-manual-name="${manualName}"]`);
    if (!block) return;
    const img = block.querySelector('.top-image');
    const wrapper = block.querySelector('.image-wrapper');
    if (!wrapper) return;
    let canvas = wrapper.querySelector('.image-points-canvas');
    if (!canvas) { canvas = document.createElement('canvas'); canvas.className = 'image-points-canvas'; wrapper.appendChild(canvas); }
    if (!img.complete || img.naturalWidth === 0) { img.onload = () => drawPointsOnImage(manualName); return; }
    const rect = wrapper.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
    canvas.style.width = `${rect.width}px`; canvas.style.height = `${rect.height}px`;
    const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr); ctx.clearRect(0, 0, rect.width, rect.height);
    const points = allPoints[manualName] || [];
    points.forEach(point => {
        const x = point.x * rect.width, y = point.y * rect.height;
        let radius = rect.width < 500 ? 10 : (rect.width < 800 ? 12 : 14);
        ctx.beginPath(); ctx.arc(x, y, radius+2, 0, 2*Math.PI); ctx.fillStyle = 'rgba(220,20,60,0.3)'; ctx.fill();
        ctx.beginPath(); ctx.arc(x, y, radius, 0, 2*Math.PI); ctx.fillStyle = '#dc143c'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        ctx.font = `bold ${Math.max(11,Math.min(16,radius))}px "Segoe UI"`; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(point.number, x, y);
    });
}
function updatePointsListInUI(manualName) {
    const block = document.querySelector(`.block[data-manual-name="${manualName}"]`);
    if (!block) return;
    const old = block.querySelector('.points-management-section'); if (old) old.remove();
    const points = allPoints[manualName] || [];
    if (points.length === 0) return;
    const section = document.createElement('div'); section.className = 'points-management-section'; section.style.cssText = 'border-top:1px solid #eee; background:#f8f9fa; padding:8px 12px;';
    section.innerHTML = `<div style="font-size:12px; font-weight:600; color:#6b7280; margin-bottom:8px;"><i class="fa-solid fa-location-dot"></i> Маркеры на схеме (нажмите на маркер для инфо):</div>`;
    points.forEach((p, idx) => {
        const row = document.createElement('div'); row.style.cssText = 'display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:13px; border-bottom:1px solid #e5e7eb;';
        const numSpan = document.createElement('span'); numSpan.style.cssText = 'color:#dc143c; font-weight:600; cursor:pointer;'; numSpan.innerHTML = `📍 №${p.number}`;
        numSpan.onclick = (e) => { e.stopPropagation(); showMarkerInfo(manualName, p.number); };
        const delBtn = document.createElement('button'); delBtn.innerHTML = '<i class="fa-solid fa-trash-can"></i>'; delBtn.style.cssText = 'background:none; border:none; color:#9ca3af; cursor:pointer; padding:4px 8px;';
        delBtn.onclick = (e) => { e.stopPropagation(); if(confirm(`Удалить маркер №${p.number}?`)) deletePointFromManual(manualName, idx); };
        row.appendChild(numSpan); row.appendChild(delBtn); section.appendChild(row);
    });
    const buttonsContainer = block.querySelector('.buttons-container'); if(buttonsContainer) buttonsContainer.appendChild(section);
}
function showMarkerInfo(manualName, partNumber) {
    // Показываем модальное окно с полной информацией по детали: фото, номер, количество
    const partData = stockData[partNumber] || { BB:{quantity:0, image:''}, KH:{quantity:0, image:''}, SKYMALL:{quantity:0, image:''}, STORE:{quantity:0, image:''} };
    let totalQty = 0;
    let anyImage = '';
    let html = `<div style="font-family: sans-serif;"><h3 style="margin:0 0 10px 0; color:#1f2937;">Деталь №${partNumber}</h3>`;
    for (let club of ['BB','KH','SKYMALL','STORE']) {
        let q = partData[club]?.quantity || 0; totalQty += q;
        if(partData[club]?.image && partData[club].image.trim()) anyImage = partData[club].image;
        html += `<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #eee;"><span>${club}:</span><span style="font-weight:bold; ${q===0?'color:#dc143c':'color:#16a34a'}">${q} шт.</span></div>`;
    }
    html += `<div style="margin-top:12px; font-weight:bold;">Общее количество: ${totalQty} шт.</div>`;
    if (anyImage) { html += `<img src="${anyImage}" style="max-width:100%; margin-top:15px; border-radius:12px;" onerror="this.style.display='none'">`; }
    else { html += `<div style="margin-top:15px; color:#888;"><i class="fa-regular fa-image"></i> Нет фото</div>`; }
    const modal = document.createElement('div'); modal.className = 'modal-overlay';
    modal.innerHTML = `<div class="modal-card">${html}<button class="modal-close">Закрыть</button></div>`;
    document.body.appendChild(modal);
    modal.querySelector('.modal-close').onclick = () => modal.remove();
    modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
}
function togglePointMode(manualName, btn) {
    if (activePointMode[manualName]) {
        activePointMode[manualName] = false; btn.classList.remove('active'); btn.innerHTML = '<i class="fa-regular fa-dot-circle"></i>';
        document.getElementById('pointModeIndicator').style.display = 'none'; showToast('Режим добавления маркеров выключен');
    } else {
        activePointMode[manualName] = true; btn.classList.add('active'); btn.innerHTML = '<i class="fa-solid fa-dot-circle"></i>';
        document.getElementById('pointModeIndicator').style.display = 'flex'; showToast('Режим добавления маркеров включен. Нажмите на схему, чтобы добавить маркер');
        setTimeout(() => { if(activePointMode[manualName]) { activePointMode[manualName] = false; btn.classList.remove('active'); btn.innerHTML = '<i class="fa-regular fa-dot-circle"></i>'; document.getElementById('pointModeIndicator').style.display = 'none'; showToast('Режим автоматически выключен'); } }, 30000);
    }
}
function showToast(msg) { const t = document.createElement('div'); t.className = 'point-toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
function setupImageClickHandler(img, manualName, buttonsContainer) {
    let wrapper = img.parentElement; if (!wrapper.classList.contains('image-wrapper')) { const newWrap = document.createElement('div'); newWrap.className = 'image-wrapper'; img.parentElement.insertBefore(newWrap, img); newWrap.appendChild(img); wrapper = newWrap; }
    const addPointInteraction = (clientX, clientY) => {
        if (!activePointMode[manualName]) { showToast('⚠️ Включите режим добавления маркеров (кнопка с кружком)'); return false; }
        const rect = wrapper.getBoundingClientRect(); const px = (clientX - rect.left) / rect.width; const py = (clientY - rect.top) / rect.height;
        if (px>=0 && px<=1 && py>=0 && py<=1) {
            const partNum = prompt('Введите номер детали для маркера:', ''); if(partNum && partNum.trim()) { addPointToManual(manualName, px, py, partNum.trim()); showToast(`✓ Маркер ${partNum} добавлен`); } return true;
        } return false;
    };
    img.onclick = (e) => { e.stopPropagation(); if(activePointMode[manualName]) { addPointInteraction(e.clientX, e.clientY); } else { if(buttonsContainer) buttonsContainer.style.display = buttonsContainer.style.display === "flex" ? "none" : "flex"; } };
    img.addEventListener('touchstart', (e) => { if(activePointMode[manualName]) { e.preventDefault(); const t = e.touches[0]; addPointInteraction(t.clientX, t.clientY); } });
    if(img.complete) drawPointsOnImage(manualName); else img.onload = () => drawPointsOnImage(manualName);
}

let currentUser = null, manualsData = [], stockData = {}, searchResults = [], currentIndex = 0, isSearchMode = false;
const manualContainer = document.getElementById("manualContainer"), searchInput = document.getElementById("searchInput"), loadingScreen = document.getElementById("loadingScreen"), loginSection = document.getElementById("login-section"), mainContent = document.getElementById("main-content"), userInfo = document.getElementById("user-info"), searchNav = document.getElementById("searchNav");

function openShopSearch() { const pn = prompt("Введите номер детали:"); if(pn && pn.trim()) { const form = document.createElement('form'); form.method='get'; form.action='https://shop.bowlingvision.com/catalogue/results.aspx'; const inp=document.createElement('input'); inp.type='text'; inp.name='search'; inp.value=pn.replace(/-/g,''); form.appendChild(inp); document.body.appendChild(form); form.submit(); setTimeout(()=>form.remove(),1000); } }
function loadSheetsAPI() { return new Promise((resolve,reject)=>{ gapi.load('client',{callback:resolve,onerror:reject}); }); }
function handleCredentialResponse(r) { try { const p = parseJwt(r.credential); currentUser = { email:p.email.toLowerCase().trim(), name:p.name, picture:p.picture }; showLoading(true); initAndCheckEmail(); } catch(e) { alert('Ошибка аутентификации'); } }
function showLoading(show) { const div = document.getElementById('login-container'); if(show) { if(!div.hasAttribute('data-original')) div.setAttribute('data-original', div.innerHTML); div.innerHTML = '<div style="padding:40px; text-align:center;"><div class="loading-spinner"></div><br><span>Проверка доступа...</span></div>'; } else if(div.getAttribute('data-original') && loginSection.style.display !== 'none') { div.innerHTML = div.getAttribute('data-original'); if(window.google?.accounts?.id) google.accounts.id.renderButton(document.querySelector('.g_id_signin'), { type:'standard', shape:'pill', theme:'outline', text:'signin_with', size:'large' }); } }
async function initAndCheckEmail() { await loadSheetsAPI(); await gapi.client.init({ apiKey:AUTH_API_KEY, discoveryDocs:['https://sheets.googleapis.com/$discovery/rest?version=v4'] }); await checkEmailInSheet(currentUser.email); }
async function checkEmailInSheet(email) { const res = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId:AUTH_SPREADSHEET_ID, range:`${AUTH_SHEET_NAME}!A:Z` }); const rows=res.result.values; let ok=false; for(let i=0;i<rows.length;i++) { if(rows[i]?.[0]?.toLowerCase().trim()===email) { for(let j=1;j<rows[i].length;j++) { if(rows[i][j]?.trim().split('?')[0]===CURRENT_SITE || rows[i][j]?.includes('MANUALS-SMART')) { ok=true; break; } } break; } } if(ok) loginUser(currentUser); else { showLoading(false); alert('Доступ запрещен'); } }
function loginUser(p) { loginSection.style.display='none'; mainContent.style.display='block'; userInfo.style.display='flex'; document.getElementById('user-pic').src=p.picture; document.getElementById('user-name').textContent=p.name; document.getElementById('user-email').textContent=p.email; localStorage.setItem('userLoggedIn','true'); localStorage.setItem('userEmail',p.email); loadFromGoogleSheets(); showLoading(false); }
function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); } catch(e) { return {}; } }
function signOut() { localStorage.clear(); if(google?.accounts?.id) google.accounts.id.disableAutoSelect(); mainContent.style.display='none'; userInfo.style.display='none'; loginSection.style.display='flex'; const div=document.getElementById('login-container'); if(div.getAttribute('data-original')) div.innerHTML=div.getAttribute('data-original'); }
async function loadFromGoogleSheets() { try { const manualsResp=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${MANUALS_RANGE}?key=${API_KEY}`); const manualResp=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${MANUAL_RANGE}?key=${API_KEY}`); const manualsRaw=await manualsResp.json(); const manualRaw=await manualResp.json(); await loadStockData(); processSheetData(manualsRaw.values, manualRaw.values); renderManualGroups(); setTimeout(()=>loadingScreen.classList.add('fade-out'),500); } catch(e) { loadingScreen.classList.add('fade-out'); manualContainer.innerHTML='<div style="padding:20px;">Ошибка загрузки</div>'; } }
async function loadStockData() { try { const stores=['STORE','BB','KH','SKYMALL']; const ranges=[STORE_RANGE,BB_RANGE,KH_RANGE,SKYMALL_RANGE]; stockData={}; for(let i=0;i<stores.length;i++) { const resp=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${ranges[i]}?key=${API_KEY}`); const data=await resp.json(); processStockSheet(data.values, stores[i]); } } catch(e) { generateDemoStockData(); } }
function processStockSheet(rows, sheet) { if(!rows) return; for(let i=1;i<rows.length;i++) { const row=rows[i]; if(!row[0]) continue; const num=row[0].trim(); const qty=parseInt(row[1])||0; if(!stockData[num]) stockData[num]={BB:{quantity:0,image:''},KH:{quantity:0,image:''},SKYMALL:{quantity:0,image:''},STORE:{quantity:0,image:''}}; stockData[num][sheet]={quantity:qty, location:row[2]||'', image:row[3]||''}; } }
function generateDemoStockData() { const all=new Set(); manualsData.forEach(m=>m.parts.forEach(p=>all.add(p))); all.forEach(p=>{ stockData[p]={BB:{quantity:Math.floor(Math.random()*5),image:''},KH:{quantity:Math.floor(Math.random()*3),image:''},SKYMALL:{quantity:Math.floor(Math.random()*4),image:''},STORE:{quantity:Math.floor(Math.random()*2),image:''}}; }); }
function processSheetData(manRows, manRef) { manualsData=[]; if(manRows) for(let i=1;i<manRows.length;i++) { const r=manRows[i]; if(r[0]) { const parts=[]; for(let j=2;j<r.length;j++) if(r[j]?.trim()) parts.push(r[j].trim()); manualsData.push({name:r[0], image:r[1]||'', parts:parts, pdf:''}); } } if(manRef) for(let i=1;i<manRef.length;i++) { const r=manRef[i]; if(r[0]) { const m=manualsData.find(x=>x.name===r[0]); if(m) m.pdf=r[1]||''; } } }
function renderManualGroups() { isSearchMode=false; manualContainer.innerHTML=""; [...new Set(manualsData.map(m=>m.name))].forEach(n=>{ const b=document.createElement("button"); b.className="start-btn"; b.innerHTML=`<i class="fa-solid fa-book-open"></i><span>${n}</span>`; b.onclick=()=>renderManualsByName(n); manualContainer.appendChild(b); }); searchInput.value=""; searchResults=[]; searchNav.style.display="none"; }
function renderManualsByName(name) { isSearchMode=false; manualContainer.innerHTML=""; const cur=manualsData.find(m=>m.name===name); if(cur?.pdf) { const pdfBtn=document.createElement("div"); pdfBtn.className="pdf-top-button"; pdfBtn.innerHTML='<i class="fa-solid fa-file-pdf"></i> MANUAL PDF'; pdfBtn.onclick=()=>window.open(cur.pdf,'_blank'); manualContainer.appendChild(pdfBtn); } manualsData.filter(m=>m.name===name).forEach(m=>renderSingleManual(m,manualContainer)); }
function renderSingleManual(manual, container) { const block=document.createElement("div"); block.className="block"; block.dataset.manualName=manual.name; loadPointsForManual(manual.name); const label=document.createElement("div"); label.className="manual-label"; const left=document.createElement("div"); left.className="manual-label-left"; left.innerHTML=`${manual.name} <i class="fa-regular fa-image"></i>`; left.onclick=()=>{ if(manual.image) window.open(manual.image); else alert('Нет изображения'); }; const actions=document.createElement("div"); actions.className="manual-label-actions"; const modeBtn=document.createElement("button"); modeBtn.innerHTML='<i class="fa-regular fa-dot-circle"></i>'; modeBtn.title="Добавить маркер"; modeBtn.onclick=(e)=>{ e.stopPropagation(); togglePointMode(manual.name, modeBtn); }; actions.appendChild(modeBtn); label.appendChild(left); label.appendChild(actions); const img=document.createElement("img"); img.className="top-image"; img.src=manual.image; img.onerror=()=>img.src='https://via.placeholder.com/400x200?text=No+Image'; const btns=document.createElement("div"); btns.className="buttons-container"; block.appendChild(label); block.appendChild(img); block.appendChild(btns); manual.parts.forEach((part,idx)=>{ const single=part.match(/\(([^)]+)\)\s+([\d-]+)/); if(single) createPartButton(btns, single[2], single[1]); else createPartButton(btns, part, (idx+1).toString()); }); container.appendChild(block); setupImageClickHandler(img, manual.name, btns); if(img.complete) { drawPointsOnImage(manual.name); updatePointsListInUI(manual.name); } else img.onload=()=>{ drawPointsOnImage(manual.name); updatePointsListInUI(manual.name); }; }
function createPartButton(container, partNum, label) { const btn=document.createElement("div"); btn.className="btn"; btn.innerHTML=`<span>${label}</span><span class="detail-number">${partNum}</span>`; btn.onclick=(e)=>{ if(e.target.classList.contains('detail-number')) { navigator.clipboard.writeText(partNum); e.target.textContent="Скопировано!"; setTimeout(()=>e.target.textContent=partNum,1200); return; } toggleDetail(btn); }; container.appendChild(btn); }
function toggleDetail(btn) { const next=btn.nextElementSibling; if(next?.classList.contains("detail-info")) { next.remove(); btn.classList.remove("active-detail"); return; } const cont=btn.parentElement; cont.querySelectorAll(".detail-info").forEach(el=>el.remove()); cont.querySelectorAll(".btn").forEach(b=>b.classList.remove("active-detail")); const part=btn.querySelector(".detail-number").textContent; const data=stockData[part]; const info=document.createElement("div"); info.className="detail-info"; let html=""; for(let club of ["BB","KH","SKYMALL","STORE"]) { const c=data?.[club]||{quantity:0, image:''}; const q=c.quantity||0; const hasImg=!!c.image?.trim(); html+=`<div class="club-row" onclick="showClubImage('${club}','${part}',event)"><span class="club-name">${club}</span><div class="club-info"><span class="club-quantity ${q===0?'count-zero':'count-positive'}">${q} шт.</span>${hasImg?'<i class="fa-solid fa-image club-image-icon"></i>':''}</div></div>`; } info.innerHTML=html; btn.after(info); btn.classList.add("active-detail"); setTimeout(()=>info.classList.add("open"),10); }
window.showClubImage = (club, part, e) => { e.stopPropagation(); const img = stockData[part]?.[club]?.image; if(img && img.trim()) window.open(img.trim(), '_blank'); else alert(`Нет изображения для ${club} / ${part}`); };
function clearSearch() { searchInput.value=""; searchResults=[]; document.querySelectorAll(".search-highlight,.active-highlight").forEach(el=>el.classList.remove("search-highlight","active-highlight")); renderManualGroups(); searchNav.style.display="none"; }
searchInput.oninput = e => { const term=e.target.value.trim(); searchResults=[]; document.querySelectorAll(".search-highlight,.active-highlight").forEach(el=>el.classList.remove("search-highlight","active-highlight")); if(!term) { renderManualGroups(); searchNav.style.display="none"; return; } isSearchMode=true; searchNav.style.display="flex"; manualContainer.innerHTML=""; manualsData.forEach(manual=>{ if(manual.parts.some(p=>p.includes(term))) renderSingleManual(manual, manualContainer); }); setTimeout(()=>{ document.querySelectorAll(".detail-number").forEach(el=>{ if(el.textContent.includes(term)) { el.classList.add("search-highlight"); searchResults.push(el); } }); if(searchResults[0]) { searchResults[0].classList.add("active-highlight"); searchResults[0].scrollIntoView({behavior:"smooth",block:"center"}); } },100); };
function nextResult() { if(!searchResults.length) return; if(searchResults[currentIndex]) searchResults[currentIndex].classList.remove("active-highlight"); currentIndex=(currentIndex+1)%searchResults.length; if(searchResults[currentIndex]) { searchResults[currentIndex].classList.add("active-highlight"); searchResults[currentIndex].scrollIntoView({behavior:"smooth",block:"center"}); } }
function prevResult() { if(!searchResults.length) return; if(searchResults[currentIndex]) searchResults[currentIndex].classList.remove("active-highlight"); currentIndex=(currentIndex-1+searchResults.length)%searchResults.length; if(searchResults[currentIndex]) { searchResults[currentIndex].classList.add("active-highlight"); searchResults[currentIndex].scrollIntoView({behavior:"smooth",block:"center"}); } }
