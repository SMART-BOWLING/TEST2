<script>
let allPoints = {};
let activePointMode = {};

function loadPointsForManual(manualName) {
    const saved = localStorage.getItem(`points_${manualName}`);
    if (saved) {
        try { allPoints[manualName] = JSON.parse(saved); } catch(e) { allPoints[manualName] = []; }
    } else { allPoints[manualName] = []; }
    return allPoints[manualName];
}
function savePointsForManual(manualName) { localStorage.setItem(`points_${manualName}`, JSON.stringify(allPoints[manualName] || [])); }
function addPointToManual(manualName, xPercent, yPercent, number) {
    if (!allPoints[manualName]) allPoints[manualName] = [];
    allPoints[manualName].push({ x: xPercent, y: yPercent, number: number, createdAt: Date.now() });
    savePointsForManual(manualName);
    drawPointsOnImage(manualName);
}
function deletePointFromManual(manualName, index) {
    if (allPoints[manualName] && allPoints[manualName][index]) {
        allPoints[manualName].splice(index, 1);
        savePointsForManual(manualName);
        drawPointsOnImage(manualName);
        updatePointsListInUI(manualName);
    }
}
function drawPointsOnImage(manualName) {
    const block = document.querySelector(`.block[data-manual-name="${manualName}"]`);
    if (!block) return;
    const img = block.querySelector('.top-image');
    const wrapper = block.querySelector('.image-wrapper');
    if (!wrapper) return;
    let canvas = wrapper.querySelector('.image-points-canvas');
    if (!canvas) { canvas = document.createElement('canvas'); canvas.className = 'image-points-canvas'; wrapper.style.position = 'relative'; wrapper.appendChild(canvas); }
    if (!img.complete || img.naturalWidth === 0) { img.onload = () => drawPointsOnImage(manualName); return; }
    const rect = wrapper.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
    canvas.style.width = `${rect.width}px`; canvas.style.height = `${rect.height}px`;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, rect.width, rect.height);
    const points = allPoints[manualName] || [];
    points.forEach(point => {
        const x = point.x * rect.width, y = point.y * rect.height;
        let radius = rect.width < 500 ? 5 : (rect.width < 800 ? 6 : 7);
        ctx.beginPath(); ctx.arc(x, y, radius + 1, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(220,20,60,0.25)'; ctx.fill();
        ctx.beginPath(); ctx.arc(x, y, radius, 0, 2 * Math.PI);
        ctx.fillStyle = '#dc143c'; ctx.fill();
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();
        const fontSize = Math.max(8, Math.min(12, radius));
        ctx.font = `bold ${fontSize}px "Segoe UI"`; ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(point.number, x, y);
    });
}
function updatePointsListInUI(manualName) {
    const block = document.querySelector(`.block[data-manual-name="${manualName}"]`);
    if (!block) return;
    const buttonsContainer = block.querySelector('.buttons-container');
    if (!buttonsContainer) return;
    const oldPointsSection = block.querySelector('.points-management-section');
    if (oldPointsSection) oldPointsSection.remove();
    const points = allPoints[manualName] || [];
    if (points.length === 0) return;
    const pointsSection = document.createElement('div'); pointsSection.className = 'points-management-section';
    pointsSection.style.borderTop = '1px solid #eee'; pointsSection.style.background = '#f8f9fa'; pointsSection.style.padding = '8px 12px';
    const title = document.createElement('div'); title.style.fontSize = '12px'; title.style.fontWeight = '600'; title.style.color = '#6b7280'; title.style.marginBottom = '8px'; title.innerHTML = '<i class="fa-solid fa-location-dot"></i> Точки на схеме:';
    pointsSection.appendChild(title);
    points.forEach((point, idx) => {
        const row = document.createElement('div'); row.style.display = 'flex'; row.style.justifyContent = 'space-between'; row.style.alignItems = 'center'; row.style.padding = '4px 0'; row.style.fontSize = '13px'; row.style.borderBottom = '1px solid #e5e7eb';
        const numberSpan = document.createElement('span'); numberSpan.style.color = '#dc143c'; numberSpan.style.fontWeight = '600'; numberSpan.textContent = `№${point.number}`;
        const deleteBtn = document.createElement('button'); deleteBtn.innerHTML = '<i class="fa-solid fa-trash-can"></i>'; deleteBtn.style.background = 'none'; deleteBtn.style.border = 'none'; deleteBtn.style.color = '#9ca3af'; deleteBtn.style.cursor = 'pointer'; deleteBtn.style.padding = '4px 8px'; deleteBtn.onclick = (e) => { e.stopPropagation(); if(confirm(`Удалить точку №${point.number}?`)) deletePointFromManual(manualName, idx); };
        row.appendChild(numberSpan); row.appendChild(deleteBtn); pointsSection.appendChild(row);
    });
    buttonsContainer.appendChild(pointsSection);
}
function togglePointMode(manualName, btnElement) {
    if (activePointMode[manualName]) {
        activePointMode[manualName] = false; btnElement.classList.remove('active'); btnElement.innerHTML = '<i class="fa-regular fa-dot-circle"></i>';
        document.getElementById('pointModeIndicator').style.display = 'none'; showPointToast('Режим добавления точек выключен');
    } else {
        activePointMode[manualName] = true; btnElement.classList.add('active'); btnElement.innerHTML = '<i class="fa-solid fa-dot-circle"></i>';
        document.getElementById('pointModeIndicator').style.display = 'flex'; showPointToast('Режим добавления точек включен. Нажмите на схему, чтобы добавить точку');
        setTimeout(() => { if(activePointMode[manualName]) { activePointMode[manualName] = false; btnElement.classList.remove('active'); btnElement.innerHTML = '<i class="fa-regular fa-dot-circle"></i>'; document.getElementById('pointModeIndicator').style.display = 'none'; showPointToast('Режим добавления точек автоматически выключен'); } }, 30000);
    }
}
function showPointToast(message) { const existing = document.querySelector('.point-toast'); if(existing) existing.remove(); const toast = document.createElement('div'); toast.className = 'point-toast'; toast.textContent = message; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000); }
function setupImageClickHandler(img, manualName, buttonsContainer) {
    let wrapper = img.parentElement;
    if (!wrapper.classList.contains('image-wrapper')) { const newWrapper = document.createElement('div'); newWrapper.className = 'image-wrapper'; img.parentElement.insertBefore(newWrapper, img); newWrapper.appendChild(img); wrapper = newWrapper; }
    const addPoint = (clientX, clientY) => {
        if (!activePointMode[manualName]) { showPointToast('⚠️ Сначала включите режим добавления точек'); return false; }
        const rect = wrapper.getBoundingClientRect(); const percentX = (clientX - rect.left) / rect.width; const percentY = (clientY - rect.top) / rect.height;
        if (percentX >= 0 && percentX <= 1 && percentY >= 0 && percentY <= 1) {
            const partNumber = prompt('Введите номер детали:', ''); if(partNumber && partNumber.trim()) { addPointToManual(manualName, percentX, percentY, partNumber.trim()); updatePointsListInUI(manualName); showPointToast(`✓ Точка ${partNumber} добавлена`); } return true;
        } return false;
    };
    img.onclick = (e) => { e.stopPropagation(); if(activePointMode[manualName]) { const rect = wrapper.getBoundingClientRect(); let cx, cy; if(e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; } else { cx = e.clientX; cy = e.clientY; } addPoint(cx, cy); } else { buttonsContainer.style.display = buttonsContainer.style.display === "flex" ? "none" : "flex"; } };
    img.addEventListener('touchstart', (e) => { if(activePointMode[manualName]) { e.preventDefault(); e.stopPropagation(); const touch = e.touches[0]; addPoint(touch.clientX, touch.clientY); } });
    if (img.complete) drawPointsOnImage(manualName); else img.onload = () => drawPointsOnImage(manualName);
}

async function loadFromGoogleSheets() { try { const manualsUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${MANUALS_RANGE}?key=${API_KEY}`; const manualsResponse=await fetch(manualsUrl); const manualsData_raw=await manualsResponse.json(); const manualUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${MANUAL_RANGE}?key=${API_KEY}`; const manualResponse=await fetch(manualUrl); const manualData_raw=await manualResponse.json(); await loadStockData(); processSheetData(manualsData_raw.values, manualData_raw.values); renderManualGroups(); setTimeout(()=>{loadingScreen.classList.add('fade-out');},500); } catch(error){ console.error(error); loadingScreen.classList.add('fade-out'); manualContainer.innerHTML='<div style="padding:20px;text-align:center;">Ошибка загрузки данных</div>'; } }
async function loadStockData() { try { const storeUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${STORE_RANGE}?key=${API_KEY}`; const storeResponse=await fetch(storeUrl); const storeData=await storeResponse.json(); const bbUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${BB_RANGE}?key=${API_KEY}`; const bbResponse=await fetch(bbUrl); const bbData=await bbResponse.json(); const khUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${KH_RANGE}?key=${API_KEY}`; const khResponse=await fetch(khUrl); const khData=await khResponse.json(); const skymallUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SKYMALL_RANGE}?key=${API_KEY}`; const skymallResponse=await fetch(skymallUrl); const skymallData=await skymallResponse.json(); stockData={}; const process=(rows,sheet)=>{ if(!rows) return; for(let i=1;i<rows.length;i++){ const row=rows[i]; if(!row[0])continue; const partNumber=row[0].trim(); const qty=parseInt(row[1])||0; const img=row[3]||''; if(!stockData[partNumber]) stockData[partNumber]={}; stockData[partNumber][sheet]={quantity:qty, location:row[2]||'', image:img}; } }; process(storeData.values,'STORE'); process(bbData.values,'BB'); process(khData.values,'KH'); process(skymallData.values,'SKYMALL'); } catch(e){ console.error(e); } }
function processSheetData(manualsRows, manualRows) { manualsData=[]; if(manualsRows) for(let i=1;i<manualsRows.length;i++){ const row=manualsRows[i]; if(!row[0]) continue; const parts=[]; for(let j=2;j<row.length;j++) if(row[j] && row[j].trim()!=='') parts.push(row[j].trim()); manualsData.push({ name:row[0], image:row[1]||'', parts:parts }); } if(manualRows) for(let i=1;i<manualRows.length;i++){ const row=manualRows[i]; if(!row[0]) continue; const manual=manualsData.find(m=>m.name===row[0]); if(manual) manual.pdf=row[1]||''; } }
function extractSingleCode(partString){ const regex=/^\(([^)]+)\)\s+([\d-]+)$/; const match=partString.match(regex); return match?{code:match[1].trim(), number:match[2].trim()}:null; }

function renderSingleManual(manual, container, hidePdfButton=false){ const block=document.createElement("div"); block.className="block"; block.dataset.manualName=manual.name; loadPointsForManual(manual.name); const labelDiv=document.createElement("div"); labelDiv.className="manual-label"; const leftPart=document.createElement("div"); leftPart.className="manual-label-left"; leftPart.innerHTML=manual.name; leftPart.onclick=(e)=>{ e.stopPropagation(); if(manual.image && manual.image.trim()!=='') window.open(manual.image,'_blank'); else alert('Изображение отсутствует'); }; const actionButtons=document.createElement("div"); actionButtons.className="manual-label-actions"; const pointModeBtn=document.createElement("button"); pointModeBtn.className="point-mode-btn"; pointModeBtn.innerHTML='<i class="fa-regular fa-dot-circle"></i>'; pointModeBtn.title="Включить режим добавления точек"; pointModeBtn.onclick=(e)=>{ e.stopPropagation(); togglePointMode(manual.name, pointModeBtn); }; actionButtons.appendChild(pointModeBtn); labelDiv.appendChild(leftPart); labelDiv.appendChild(actionButtons); const img=document.createElement("img"); img.className="top-image"; img.src=manual.image; img.onerror=()=>{ img.src='https://via.placeholder.com/400x200?text=No+Image'; }; const buttonsContainer=document.createElement("div"); buttonsContainer.className="buttons-container"; block.appendChild(labelDiv); block.appendChild(img); block.appendChild(buttonsContainer); manual.parts.forEach((part,index)=>{ const singleCode=extractSingleCode(part); if(singleCode) createPartButton(buttonsContainer, singleCode.number, singleCode.code); else if(isCompositePart(part)) parseCompositeParts(part).forEach(p=>createPartButton(buttonsContainer, p.number, p.code)); else createPartButton(buttonsContainer, part, (index+1).toString()); }); container.appendChild(block); setupImageClickHandler(img, manual.name, buttonsContainer); if(img.complete){ drawPointsOnImage(manual.name); updatePointsListInUI(manual.name); }else{ img.onload=()=>{ drawPointsOnImage(manual.name); updatePointsListInUI(manual.name); }; } }
function createPartButton(container, partNumber, label){ const btn=document.createElement("div"); btn.className="btn"; btn.innerHTML=`<span>${label}</span><span class="detail-number">${partNumber}</span>`; btn.onclick=(e)=>{ const targetDetail=e.target.closest(".detail-number"); if(targetDetail){ e.stopPropagation(); const originalText=targetDetail.textContent; navigator.clipboard.writeText(originalText).then(()=>{ targetDetail.textContent="Скопировано!"; setTimeout(()=>targetDetail.textContent=originalText,1200); }); return; } const nextEl=btn.nextElementSibling; if(nextEl && nextEl.classList.contains("detail-info")){ nextEl.remove(); btn.classList.remove("active-detail"); return; } const container=btn.parentElement; container.querySelectorAll(".detail-info").forEach(el=>el.remove()); container.querySelectorAll(".btn").forEach(b=>b.classList.remove("active-detail")); const part=btn.querySelector(".detail-number").textContent; const partData=stockData[part]; const info=document.createElement("div"); info.className="detail-info"; let clubDataHtml=""; ["BB","KH","SKYMALL","STORE"].forEach(club=>{ const clubInfo=partData?.[club]||{quantity:0,location:'',image:''}; const count=clubInfo.quantity||0; const hasImage=clubInfo.image && clubInfo.image.trim()!==''; clubDataHtml+=`<div class="club-row ${hasImage?'has-image':''}" onclick="handleClubClick('${club}','${part}',event)" data-club="${club}" data-part="${part}"><span class="club-name">${club}</span><div class="club-info"><span class="club-quantity ${count===0?'count-zero':'count-positive'}">${count} шт.</span>${hasImage?'<i class="fa-solid fa-image club-image-icon" title="Нажмите чтобы увидеть изображение"></i>':''}</div></div>`; }); info.innerHTML=clubDataHtml; btn.after(info); btn.classList.add("active-detail"); setTimeout(()=>info.classList.add("open"),10); }; container.appendChild(btn); }
