<script>
// ==================== ТОЧКИ И OCR ====================
let allPoints = {};
let activePointMode = {};

function loadPointsForManual(manualName) {
  const saved = localStorage.getItem(`points_${manualName}`);
  allPoints[manualName] = saved ? JSON.parse(saved) : [];
  return allPoints[manualName];
}

function savePointsForManual(manualName) {
  localStorage.setItem(`points_${manualName}`, JSON.stringify(allPoints[manualName] || []));
}

function addPointToManual(manualName, xPercent, yPercent, number) {
  if (!allPoints[manualName]) allPoints[manualName] = [];
  allPoints[manualName].push({ x: xPercent, y: yPercent, number: number, createdAt: Date.now() });
  savePointsForManual(manualName);
  drawPointsOnImage(manualName);
  updatePointsListInUI(manualName);
}

function deletePointFromManual(manualName, index) {
  allPoints[manualName].splice(index, 1);
  savePointsForManual(manualName);
  drawPointsOnImage(manualName);
  updatePointsListInUI(manualName);
}

function drawPointsOnImage(manualName) {
  const block = document.querySelector(`.block[data-manual-name="${manualName}"]`);
  if (!block) return;
  const img = block.querySelector('.top-image');
  const wrapper = block.querySelector('.image-wrapper');
  if (!wrapper) return;
  
  let canvas = wrapper.querySelector('.image-points-canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.className = 'image-points-canvas';
    wrapper.appendChild(canvas);
  }
  
  if (!img.complete || img.naturalWidth === 0) {
    img.onload = () => drawPointsOnImage(manualName);
    return;
  }
  
  const rect = wrapper.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = `${rect.width}px`;
  canvas.style.height = `${rect.height}px`;
  
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, rect.width, rect.height);
  
  const points = allPoints[manualName] || [];
  points.forEach(point => {
    const x = point.x * rect.width;
    const y = point.y * rect.height;
    let radius = rect.width < 500 ? 5 : 7;
    
    ctx.beginPath();
    ctx.arc(x, y, radius + 1, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(220,20,60,0.25)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, 2 * Math.PI);
    ctx.fillStyle = '#dc143c';
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    ctx.font = `bold ${Math.max(8, radius)}px "Segoe UI"`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(point.number, x, y);
  });
}

function updatePointsListInUI(manualName) {
  const block = document.querySelector(`.block[data-manual-name="${manualName}"]`);
  if (!block) return;
  const container = block.querySelector('.buttons-container');
  if (!container) return;
  
  const old = block.querySelector('.points-management-section');
  if (old) old.remove();
  
  const points = allPoints[manualName] || [];
  if (points.length === 0) return;
  
  const section = document.createElement('div');
  section.className = 'points-management-section';
  section.style.cssText = 'border-top:1px solid #eee;background:#f8f9fa;padding:8px 12px';
  section.innerHTML = '<div style="font-size:12px;font-weight:600;margin-bottom:8px"><i class="fa-solid fa-location-dot"></i> Точки на схеме:</div>';
  
  points.forEach((p, idx) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #e5e7eb';
    row.innerHTML = `<span style="color:#dc143c;font-weight:600">№${p.number}</span>
      <button style="background:none;border:none;color:#9ca3af;cursor:pointer" onclick="deletePointFromManual('${manualName}', ${idx})">
        <i class="fa-solid fa-trash-can"></i>
      </button>`;
    section.appendChild(row);
  });
  container.appendChild(section);
}

// АВТОРАССТАНОВКА ЧЕРЕЗ OCR
async function autoRecognizeNumbers(manualName) {
  const block = document.querySelector(`.block[data-manual-name="${manualName}"]`);
  if (!block) return;
  const img = block.querySelector('.top-image');
  if (!img || !img.src) { showToast('❌ Изображение не найдено'); return; }
  
  const progress = document.createElement('div');
  progress.className = 'ocr-progress';
  progress.innerHTML = '<div class="spinner"></div><div>🔍 Распознавание цифр...<br><small>3-10 секунд</small></div>';
  document.body.appendChild(progress);
  
  try {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const tempImg = new Image();
    tempImg.crossOrigin = 'Anonymous';
    
    await new Promise((resolve, reject) => {
      tempImg.onload = resolve;
      tempImg.onerror = reject;
      tempImg.src = img.src;
    });
    
    canvas.width = tempImg.width;
    canvas.height = tempImg.height;
    ctx.drawImage(tempImg, 0, 0);
    
    // Улучшение контраста
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
      const val = brightness > 128 ? 255 : 0;
      data[i] = data[i+1] = data[i+2] = val;
    }
    ctx.putImageData(imageData, 0, 0);
    
    progress.innerHTML = '<div class="spinner"></div><div>📖 Анализ текста...</div>';
    
    const { data: { words } } = await Tesseract.recognize(canvas.toDataURL(), 'eng', {
      tessedit_char_whitelist: '0123456789',
      logger: m => {
        if (m.status === 'recognizing text')
          progress.innerHTML = `<div class="spinner"></div><div>⚙️ Распознавание: ${Math.round(m.progress * 100)}%</div>`;
      }
    });
    
    progress.innerHTML = '<div class="spinner"></div><div>📍 Расстановка точек...</div>';
    
    const wrapper = block.querySelector('.image-wrapper');
    const rect = wrapper.getBoundingClientRect();
    let added = 0;
    const seen = new Set();
    
    for (const word of words || []) {
      const numbers = word.text.match(/\d{2,6}/g);
      if (numbers && numbers.length) {
        const number = numbers[0];
        if (seen.has(number)) continue;
        seen.add(number);
        
        const bbox = word.bbox;
        if (bbox) {
          const centerX = (bbox.x0 + bbox.x1) / 2;
          const centerY = (bbox.y0 + bbox.y1) / 2;
          const percentX = centerX / canvas.width;
          const percentY = centerY / canvas.height;
          
          if (percentX >= 0 && percentX <= 1 && percentY >= 0 && percentY <= 1) {
            addPointToManual(manualName, percentX, percentY, number);
            added++;
          }
        }
      }
    }
    
    progress.remove();
    showToast(added > 0 ? `✅ Добавлено ${added} точек` : '⚠️ Цифры не найдены');
    drawPointsOnImage(manualName);
    
  } catch (e) {
    progress.remove();
    showToast('❌ Ошибка распознавания');
    console.error(e);
  }
}

function togglePointMode(manualName, btn) {
  if (activePointMode[manualName]) {
    activePointMode[manualName] = false;
    btn.classList.remove('active');
    btn.innerHTML = '<i class="fa-regular fa-dot-circle"></i>';
    document.getElementById('pointModeIndicator').style.display = 'none';
  } else {
    activePointMode[manualName] = true;
    btn.classList.add('active');
    btn.innerHTML = '<i class="fa-solid fa-dot-circle"></i>';
    document.getElementById('pointModeIndicator').style.display = 'flex';
    showToast('Режим добавления точек включен');
    setTimeout(() => {
      if (activePointMode[manualName]) togglePointMode(manualName, btn);
    }, 30000);
  }
}

function showToast(msg) {
  const existing = document.querySelector('.point-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'point-toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

function setupImageClickHandler(img, manualName, container) {
  let wrapper = img.parentElement;
  if (!wrapper.classList.contains('image-wrapper')) {
    const newWrapper = document.createElement('div');
    newWrapper.className = 'image-wrapper';
    img.parentElement.insertBefore(newWrapper, img);
    newWrapper.appendChild(img);
    wrapper = newWrapper;
  }
  
  const handleClick = (clientX, clientY) => {
    if (!activePointMode[manualName]) {
      showToast('Сначала включите режим добавления точек');
      return;
    }
    const rect = wrapper.getBoundingClientRect();
    const x = (clientX - rect.left) / rect.width;
    const y = (clientY - rect.top) / rect.height;
    if (x >= 0 && x <= 1 && y >= 0 && y <= 1) {
      const num = prompt('Номер детали:');
      if (num && num.trim()) {
        addPointToManual(manualName, x, y, num.trim());
        showToast(`✓ Точка ${num} добавлена`);
      }
    }
  };
  
  img.onclick = (e) => {
    if (activePointMode[manualName]) {
      const cx = e.clientX, cy = e.clientY;
      handleClick(cx, cy);
    } else {
      container.style.display = container.style.display === 'flex' ? 'none' : 'flex';
    }
  };
  
  img.addEventListener('touchstart', (e) => {
    if (activePointMode[manualName]) {
      e.preventDefault();
      const touch = e.touches[0];
      handleClick(touch.clientX, touch.clientY);
    }
  });
  
  if (img.complete) drawPointsOnImage(manualName);
  else img.onload = () => drawPointsOnImage(manualName);
}

async function loadFromGoogleSheets() {
  try {
    const manualsUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/MANUALS!A:CC?key=${API_KEY}`;
    const manualUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/MANUAL!A:B?key=${API_KEY}`;
    const [manualsRes, manualRes] = await Promise.all([fetch(manualsUrl), fetch(manualUrl)]);
    const manualsData_raw = await manualsRes.json();
    const manualData_raw = await manualRes.json();
    await loadStockData();
    processSheetData(manualsData_raw.values, manualData_raw.values);
    renderManualGroups();
    setTimeout(() => loadingScreen.classList.add('fade-out'), 500);
  } catch(e) { loadingScreen.classList.add('fade-out'); manualContainer.innerHTML = '<div style="padding:20px">Ошибка загрузки</div>'; }
}

async function loadStockData() {
  const sheets = ['STORE', 'BB', 'KH', 'SKYMALL'];
  for (const sheet of sheets) {
    try {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheet}!A:D?key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
      for (let i = 1; i < (data.values || []).length; i++) {
        const row = data.values[i];
        if (!row[0]) continue;
        if (!stockData[row[0]]) stockData[row[0]] = {};
        stockData[row[0]][sheet] = { quantity: parseInt(row[1]) || 0, location: row[2] || '', image: row[3] || '' };
      }
    } catch(e) {}
  }
}

function processSheetData(manualsRows, manualRows) {
  manualsData = [];
  for (let i = 1; manualsRows && i < manualsRows.length; i++) {
    const row = manualsRows[i];
    if (!row[0]) continue;
    const parts = [];
    for (let j = 2; j < row.length; j++) if (row[j]?.trim()) parts.push(row[j].trim());
    manualsData.push({ name: row[0], image: row[1] || '', parts, pdf: '' });
  }
  for (let i = 1; manualRows && i < manualRows.length; i++) {
    const row = manualRows[i];
    const m = manualsData.find(m => m.name === row[0]);
    if (m) m.pdf = row[1] || '';
  }
}

function extractSingleCode(s) {
  const m = s.match(/^\(([^)]+)\)\s+([\d-]+)$/);
  return m ? { code: m[1], number: m[2] } : null;
}

function isCompositePart(s) { return (s.match(/\([^)]+\)\s+[\d-]+/g) || []).length > 1; }
function parseCompositeParts(s) {
  const res = [];
  const regex = /\(([^)]+)\)\s+([\d-]+)/g;
  let m;
  while ((m = regex.exec(s)) !== null) res.push({ code: m[1], number: m[2] });
  return res;
}

function renderManualGroups() {

function renderManualsByName(name) {
  manualContainer.innerHTML = '';

  manualContainer.appendChild(pdfBtn);
  manualsData.filter(m => m.name === name).forEach(m => renderSingleManual(m, manualContainer));
}

  const actions = document.createElement('div');
  actions.className = 'manual-label-actions';
  
  const autoBtn = document.createElement('button');
  autoBtn.className = 'auto-recognize-btn';
  autoBtn.innerHTML = '<i class="fa-solid fa-wand-magic"></i> Авто';
  autoBtn.title = 'Автоматически распознать цифры и расставить точки';

  const btnContainer = document.createElement('div');
  btnContainer.className = 'buttons-container';
  
  manual.parts.forEach((part, idx) => {
    const code = extractSingleCode(part);
    if (code) createPartButton(btnContainer, code.number, code.code);
    else if (isCompositePart(part)) parseCompositeParts(part).forEach(p => createPartButton(btnContainer, p.number, p.code));

function createPartButton(container, partNumber, label) {
  const btn = document.createElement('div');
  btn.className = 'btn';
  btn.innerHTML = `<span>${label}</span><span class="detail-number">${partNumber}</span>`;
  btn.onclick = (e) => {
    if (e.target.closest('.detail-number')) {
      const num = e.target.closest('.detail-number').textContent;
      navigator.clipboard.writeText(num);
      showToast(`Скопировано: ${num}`);
      return;
    }
    const detail = btn.nextElementSibling;
    if (detail?.classList.contains('detail-info')) { detail.remove(); btn.classList.remove('active-detail'); return; }
    document.querySelectorAll('.detail-info').forEach(el => el.remove());
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active-detail'));
    
    const data = stockData[partNumber] || {};
    const info = document.createElement('div');
    info.className = 'detail-info';
    let html = '';
    ['BB', 'KH', 'SKYMALL', 'STORE'].forEach(club => {
      const clubData = data[club] || { quantity: 0, image: '' };
      const hasImg = clubData.image && clubData.image.trim();
      html += `<div class="club-row" onclick="if('${hasImg}') window.open('${clubData.image}', '_blank')">
        <span class="club-name">${club}</span>
        <span class="club-quantity ${clubData.quantity === 0 ? 'count-zero' : 'count-positive'}">${clubData.quantity} шт.</span>
      </div>`;
    });
    info.innerHTML = html;
    btn.after(info);
    btn.classList.add('active-detail');
    setTimeout(() => info.classList.add('open'), 10);
  };
  container.appendChild(btn);
}

function clearSearch() {
  searchInput.value = '';
  searchResults = [];
  renderManualGroups();
  searchNav.style.display = 'none';
}

function nextResult() { if (searchResults.length) { currentIndex = (currentIndex + 1) % searchResults.length; scrollToResult(); } }
function prevResult() { if (searchResults.length) { currentIndex = (currentIndex - 1 + searchResults.length) % searchResults.length; scrollToResult(); } }
function scrollToResult() { searchResults[currentIndex]?.scrollIntoView({ behavior: 'smooth', block: 'center' }); }

searchInput.oninput = (e) => {
  const term = e.target.value.trim();
  if (!term) { renderManualGroups(); searchNav.style.display = 'none'; return; }
  searchNav.style.display = 'flex';
  manualContainer.innerHTML = '';
  manualsData.forEach(m => {
    const match = m.parts.some(p => {
      const sc = extractSingleCode(p);
      if (sc && sc.number.includes(term)) return true;
      if (isCompositePart(p)) return parseCompositeParts(p).some(pp => pp.number.includes(term));
      return p.includes(term);
    });
    if (match) renderSingleManual(m, manualContainer);
  });
  setTimeout(() => {
    searchResults = [...document.querySelectorAll('.detail-number')].filter(el => el.textContent.includes(term));
    searchResults.forEach(el => el.classList.add('search-highlight'));
    if (searchResults[0]) searchResults[0].classList.add('active-highlight');
  }, 100);
};
