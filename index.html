<script>
// ========== СИСТЕМА ДОБАВЛЕНИЯ ТОЧЕК ==========
// УЛУЧШЕНО: маркер уменьшен в 2 раза для мобильных устройств
let allPoints = {};
let activePointMode = {};

function loadPointsForManual(manualName) {
    const saved = localStorage.getItem(`points_${manualName}`);
    if (saved) {
        try {
            allPoints[manualName] = JSON.parse(saved);
        } catch(e) { allPoints[manualName] = []; }
    } else {
        allPoints[manualName] = [];
    }
    return allPoints[manualName];
}

function savePointsForManual(manualName) {
    localStorage.setItem(`points_${manualName}`, JSON.stringify(allPoints[manualName] || []));
}

function addPointToManual(manualName, xPercent, yPercent, number) {
    if (!allPoints[manualName]) allPoints[manualName] = [];
    allPoints[manualName].push({
        x: xPercent,
        y: yPercent,
        number: number,
        createdAt: Date.now()
    });
    savePointsForManual(manualName);
    drawPointsOnImage(manualName);
}

function deletePointFromManual(manualName, index) {
    if (allPoints[manualName] && allPoints[manualName][index]) {
        allPoints[manualName].splice(index, 1);
        savePointsForManual(manualName);
        drawPointsOnImage(manualName);
        updatePointsListInUI(manualName);
    }
}

// ОТРИСОВКА ТОЧЕК - МАРКЕР В 2 РАЗА МЕНЬШЕ ДЛЯ ТЕЛЕФОНОВ
function drawPointsOnImage(manualName) {
    const block = document.querySelector(`.block[data-manual-name="${manualName}"]`);
    if (!block) return;
    
    const img = block.querySelector('.top-image');
    const wrapper = block.querySelector('.image-wrapper');
    if (!wrapper) return;
    
    let canvas = wrapper.querySelector('.image-points-canvas');
    if (!canvas) {
        canvas = document.createElement('canvas');
        canvas.className = 'image-points-canvas';
        wrapper.style.position = 'relative';
        wrapper.appendChild(canvas);
    }
    
    if (!img.complete || img.naturalWidth === 0) {
        img.onload = () => drawPointsOnImage(manualName);
        return;
    }
    
    const rect = wrapper.getBoundingClientRect();
    const devicePixelRatio = window.devicePixelRatio || 1;
    
    canvas.width = rect.width * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    canvas.style.width = `${rect.width}px`;
    canvas.style.height = `${rect.height}px`;
    
    const ctx = canvas.getContext('2d');
    ctx.scale(devicePixelRatio, devicePixelRatio);
    ctx.clearRect(0, 0, rect.width, rect.height);
    
    const points = allPoints[manualName] || [];
    
    points.forEach(point => {
        const x = point.x * rect.width;
        const y = point.y * rect.height;
        
        // РАЗМЕР МАРКЕРА УМЕНЬШЕН В 2 РАЗА ДЛЯ ТЕЛЕФОНОВ
        let radius;
        if (rect.width < 500) {
            radius = 5; // на телефонах 5px вместо 10 (в 2 раза меньше)
        } else if (rect.width < 800) {
            radius = 6; // на планшетах
        } else {
            radius = 7; // на десктопе
        }
        
        // Внешнее свечение полупрозрачное (тоже пропорционально уменьшено)
        ctx.beginPath();
        ctx.arc(x, y, radius + 1, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(220, 20, 60, 0.25)';
        ctx.fill();
        
        // Основной кружок (четкий)
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, 2 * Math.PI);
        ctx.fillStyle = '#dc143c';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        
        // Номер детали (мелкий шрифт)
        const fontSize = Math.max(8, Math.min(12, radius));
        ctx.font = `bold ${fontSize}px "Segoe UI", -apple-system, system-ui`;
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(point.number, x, y);
    });
}

function updatePointsListInUI(manualName) {
    const block = document.querySelector(`.block[data-manual-name="${manualName}"]`);
    if (!block) return;
    
    const buttonsContainer = block.querySelector('.buttons-container');
    if (!buttonsContainer) return;
    
    const oldPointsSection = block.querySelector('.points-management-section');
    if (oldPointsSection) oldPointsSection.remove();
    
    const points = allPoints[manualName] || [];
    if (points.length === 0) return;
    
    const pointsSection = document.createElement('div');
    pointsSection.className = 'points-management-section';
    pointsSection.style.borderTop = '1px solid #eee';
    pointsSection.style.background = '#f8f9fa';
    pointsSection.style.padding = '8px 12px';
    
    const title = document.createElement('div');
    title.style.fontSize = '12px';
    title.style.fontWeight = '600';
    title.style.color = '#6b7280';
    title.style.marginBottom = '8px';
    title.style.padding = '4px 0';
    title.innerHTML = '<i class="fa-solid fa-location-dot"></i> Точки на схеме:';
    pointsSection.appendChild(title);
    
    points.forEach((point, idx) => {
        const row = document.createElement('div');
        row.style.display = 'flex';
        row.style.justifyContent = 'space-between';
        row.style.alignItems = 'center';
        row.style.padding = '4px 0';
        row.style.fontSize = '13px';
        row.style.borderBottom = '1px solid #e5e7eb';
        
        const numberSpan = document.createElement('span');
        numberSpan.style.color = '#dc143c';
        numberSpan.style.fontWeight = '600';
        numberSpan.textContent = `№${point.number}`;
        
        const deleteBtn = document.createElement('button');
        deleteBtn.innerHTML = '<i class="fa-solid fa-trash-can"></i>';
        deleteBtn.style.background = 'none';
        deleteBtn.style.border = 'none';
        deleteBtn.style.color = '#9ca3af';
        deleteBtn.style.cursor = 'pointer';
        deleteBtn.style.padding = '4px 8px';
        deleteBtn.style.borderRadius = '4px';
        deleteBtn.onclick = (e) => {
            e.stopPropagation();
            if (confirm(`Удалить точку №${point.number}?`)) {
                deletePointFromManual(manualName, idx);
            }
        };
        
        row.appendChild(numberSpan);
        row.appendChild(deleteBtn);
        pointsSection.appendChild(row);
    });
    
    buttonsContainer.appendChild(pointsSection);
}

function togglePointMode(manualName, btnElement) {
    if (activePointMode[manualName]) {
        activePointMode[manualName] = false;
        btnElement.classList.remove('active');
        btnElement.innerHTML = '<i class="fa-regular fa-dot-circle"></i>';
        document.getElementById('pointModeIndicator').style.display = 'none';
        showPointToast('Режим добавления точек выключен');
    } else {
        activePointMode[manualName] = true;
        btnElement.classList.add('active');
        btnElement.innerHTML = '<i class="fa-solid fa-dot-circle"></i>';
        document.getElementById('pointModeIndicator').style.display = 'flex';
        showPointToast('Режим добавления точек включен. Нажмите на схему, чтобы добавить точку');
        
        setTimeout(() => {
            if (activePointMode[manualName]) {
                activePointMode[manualName] = false;
                btnElement.classList.remove('active');
                btnElement.innerHTML = '<i class="fa-regular fa-dot-circle"></i>';
                document.getElementById('pointModeIndicator').style.display = 'none';
                showPointToast('Режим добавления точек автоматически выключен');
            }
        }, 30000);
    }
}

function showPointToast(message) {
    const existing = document.querySelector('.point-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'point-toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function setupImageClickHandler(img, manualName, buttonsContainer) {
    let wrapper = img.parentElement;
    if (!wrapper.classList.contains('image-wrapper')) {
        const newWrapper = document.createElement('div');
        newWrapper.className = 'image-wrapper';
        img.parentElement.insertBefore(newWrapper, img);
        newWrapper.appendChild(img);
        wrapper = newWrapper;
    }
    
    const togglePartsList = (e) => {
        e.stopPropagation();
        buttonsContainer.style.display = buttonsContainer.style.display === "flex" ? "none" : "flex";
    };
    
    const addPoint = (clientX, clientY) => {
        if (!activePointMode[manualName]) {
            showPointToast('⚠️ Сначала включите режим добавления точек (кнопка с кружком)');
            return false;
        }
        
        const rect = wrapper.getBoundingClientRect();
        const percentX = (clientX - rect.left) / rect.width;
        const percentY = (clientY - rect.top) / rect.height;
        
        if (percentX >= 0 && percentX <= 1 && percentY >= 0 && percentY <= 1) {
            const partNumber = prompt('Введите номер детали:', '');
            if (partNumber && partNumber.trim()) {
                addPointToManual(manualName, percentX, percentY, partNumber.trim());
                updatePointsListInUI(manualName);
                showPointToast(`✓ Точка ${partNumber} добавлена`);
            }
            return true;
        }
        return false;
    };
    
    img.onclick = (e) => {
        e.stopPropagation();
        if (activePointMode[manualName]) {
            const rect = wrapper.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            addPoint(clientX, clientY);
        } else {
            togglePartsList(e);
        }
    };
    
    img.addEventListener('touchstart', (e) => {
        if (activePointMode[manualName]) {
            e.preventDefault();
            e.stopPropagation();
            const touch = e.touches[0];
            addPoint(touch.clientX, touch.clientY);
        }
    });
    
    if (img.complete) {
        drawPointsOnImage(manualName);
    } else {
        img.onload = () => drawPointsOnImage(manualName);
    }
}
// ========== ОСТАЛЬНОЙ КОД (без изменений, кроме удаления иконки) ==========

// В функции renderSingleManual убрана иконка из leftPart, код остальной корректен
function renderSingleManual(manual, container, hidePdfButton = false) {
  const block = document.createElement("div"); 
  block.className = "block";
  block.dataset.manualName = manual.name;
  loadPointsForManual(manual.name);
  const labelDiv = document.createElement("div");
  labelDiv.className = "manual-label";
  const leftPart = document.createElement("div");
  leftPart.className = "manual-label-left";
  leftPart.innerHTML = manual.name; // иконка удалена полностью
  leftPart.onclick = (e) => {
    e.stopPropagation();
    if (manual.image && manual.image.trim() !== '') {
      window.open(manual.image, '_blank');
    } else {
      alert('Изображение отсутствует');
    }
  };
  const actionButtons = document.createElement("div");
  actionButtons.className = "manual-label-actions";
  const pointModeBtn = document.createElement("button");
  pointModeBtn.className = "point-mode-btn";
  pointModeBtn.innerHTML = '<i class="fa-regular fa-dot-circle"></i>';
  pointModeBtn.title = "Включить режим добавления точек";
  pointModeBtn.onclick = (e) => {
    e.stopPropagation();
    togglePointMode(manual.name, pointModeBtn);
  };
  actionButtons.appendChild(pointModeBtn);
  labelDiv.appendChild(leftPart);
  labelDiv.appendChild(actionButtons);
  const img = document.createElement("img");
  img.className = "top-image";
  img.src = manual.image;
  img.onerror = () => { img.src = 'https://via.placeholder.com/400x200?text=No+Image'; };
  const buttonsContainer = document.createElement("div");
  buttonsContainer.className = "buttons-container";
  block.appendChild(labelDiv);
  block.appendChild(img);
  block.appendChild(buttonsContainer);
  manual.parts.forEach((part, index) => {
    const singleCode = extractSingleCode(part);
    if (singleCode) { createPartButton(buttonsContainer, singleCode.number, singleCode.code); } 
    else if (isCompositePart(part)) { parseCompositeParts(part).forEach(parsedPart => { createPartButton(buttonsContainer, parsedPart.number, parsedPart.code); }); } 
    else { createPartButton(buttonsContainer, part, (index + 1).toString()); }
  });
  container.appendChild(block);
  setupImageClickHandler(img, manual.name, buttonsContainer);
  if (img.complete) {
    drawPointsOnImage(manual.name);
    updatePointsListInUI(manual.name);
  } else {
    img.onload = () => {
      drawPointsOnImage(manual.name);
      updatePointsListInUI(manual.name);
    };
  }
}
